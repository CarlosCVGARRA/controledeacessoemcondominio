<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Condomínio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c") no-repeat center center fixed;
  background-size:cover;
}

.bg-overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

#loginScreen{
  position:fixed;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  padding:30px;
  border-radius:15px;
  width:340px;
  text-align:center;
  color:white;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  outline:none;
}

button{
  padding:7px 10px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.error{
  background:red;
  padding:8px;
  border-radius:6px;
  margin-top:10px;
  display:none;
}

#app{
  display:none;
  padding:15px;
}

header{
  background:rgba(0,0,0,0.6);
  color:white;
  padding:12px;
  border-radius:10px;
}

.container{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.form, .list{
  width:50%;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  padding:15px;
  border-radius:12px;
  color:white;
  height:85vh;
  overflow:auto;
}

.card{
  background:rgba(0,0,0,0.4);
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

.card.selected{
  border:2px solid #00d4ff;
}

img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:6px;
}

/* 🔥 BOTÕES MAIORES (70% DA ÁREA DO FORMULÁRIO) */
.top-actions{
  width:70%;
  margin:0 auto 12px auto;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.top-actions button{
  flex:1;
  padding:12px 8px;
  font-size:13px;
}

/* campos lado a lado */
.dupla{
  display:flex;
  gap:8px;
}

.dupla .pequeno{width:40%;}
.dupla .medio{width:60%;}

#obs{
  height:180px;
  resize:none;
  overflow-y:auto;
}

/* modo visualização */
.readonly input,
.readonly textarea{
  pointer-events:none;
  background:rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="bg-overlay"></div>

<div id="loginScreen">
  <div class="login-box">
    <h2>Condomínio</h2>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="login()">Entrar</button>
    <div class="error" id="error">Senha incorreta</div>
  </div>
</div>

<div id="app">

<header>
Sistema de Moradores
<button onclick="selectFolder()" style="float:right;">Selecionar Pasta</button>
</header>

<div class="container">

<div class="form" id="formBox">

<h3>Cadastro de Morador</h3>

<div class="top-actions">
  <button onclick="novoMorador()" style="background:#28a745;">Novo</button>
  <button onclick="salvar()">Salvar</button>
  <button onclick="editarSelecionado()">Editar</button>
  <button onclick="visualizarSelecionado()" style="background:#6c757d;">Visualizar</button>
  <button onclick="apagarSelecionado()" style="background:red;">Apagar</button>
</div>

<input id="nome" placeholder="NOME">
<input id="cpf" placeholder="CPF">
<input id="rg" placeholder="RG">
<input id="cnh" placeholder="CNH">
<input id="endereco" placeholder="Endereço CEP">

<div class="dupla">
  <input id="quadra" class="pequeno" placeholder="Quadra e Lote">
  <input id="cidade" class="medio" placeholder="Cidade">
</div>

<div class="section">
<h4>Placas</h4>
<div id="placas"></div>
<button onclick="addPlaca()">+ Placa</button>
</div>

<div class="section">
<h4>Familiares</h4>
<div id="familiares"></div>
<button onclick="addFam()">+ Contato</button>
</div>

<div class="section">
<h4>Foto</h4>
<input type="file" onchange="foto(event)">
<img id="preview">
</div>

<div class="section">
<h4>Observações</h4>
<textarea id="obs"></textarea>
</div>

</div>

<div class="list">
<h3>Moradores</h3>
<input id="busca" placeholder="Buscar..." oninput="render()">
<div id="lista"></div>
</div>

</div>
</div>

<script>

const senhaCorreta = "201066";

let moradores = [];
let fotoBase64 = "";
let dirHandle = null;
let editId = null;
let selecionado = null;
let modoVisualizar = false;

const senhaEl = document.getElementById("senha");
const errorEl = document.getElementById("error");
const formBox = document.getElementById("formBox");

const nomeEl = document.getElementById("nome");
const cpfEl = document.getElementById("cpf");
const rgEl = document.getElementById("rg");
const cnhEl = document.getElementById("cnh");
const enderecoEl = document.getElementById("endereco");
const quadraEl = document.getElementById("quadra");
const cidadeEl = document.getElementById("cidade");
const obsEl = document.getElementById("obs");

const placasEl = document.getElementById("placas");
const familiaresEl = document.getElementById("familiares");
const listaEl = document.getElementById("lista");
const previewEl = document.getElementById("preview");

const loginScreen = document.getElementById("loginScreen");
const app = document.getElementById("app");

senhaEl.addEventListener("keydown", e=>{
  if(e.key==="Enter") login();
});

function login(){
  if(senhaEl.value === senhaCorreta){
    loginScreen.style.display="none";
    app.style.display="block";
  } else {
    errorEl.style.display="block";
    setTimeout(()=>errorEl.style.display="none",2000);
  }
}

async function selectFolder(){
  dirHandle = await window.showDirectoryPicker();
  await loadDatabase();
  alert("Pasta conectada!");
}

async function loadDatabase(){
  if(!dirHandle) return;
  try{
    const fileHandle = await dirHandle.getFileHandle("database.json");
    const file = await fileHandle.getFile();
    moradores = JSON.parse(await file.text() || "[]");
  }catch{
    moradores=[];
  }
  render();
}

async function salvarArquivo(){
  const fileHandle = await dirHandle.getFileHandle("database.json",{create:true});
  const writable = await fileHandle.createWritable();
  await writable.write(JSON.stringify(moradores,null,2));
  await writable.close();
  render();
  limpar();
}

async function salvar(){
  if(!dirHandle){
    alert("Selecione a pasta!");
    return;
  }

  let obj = {
    id: editId || Date.now(),
    nome: nomeEl.value,
    cpf: cpfEl.value,
    rg: rgEl.value,
    cnh: cnhEl.value,
    endereco: enderecoEl.value,
    quadra: quadraEl.value,
    cidade: cidadeEl.value,
    placas: [...placasEl.querySelectorAll("input")].map(i=>i.value.toUpperCase()),
    familiares: [...familiaresEl.querySelectorAll("input")].map(i=>i.value),
    foto: fotoBase64,
    obs: obsEl.value
  };

  if(editId){
    moradores = moradores.map(m=>m.id===editId?obj:m);
    editId=null;
  } else {
    moradores.push(obj);
  }

  await salvarArquivo();
}

function editarSelecionado(){
  if(!selecionado) return alert("Selecione um morador");

  if(!confirm("Tem certeza que deseja editar este morador?")) return;

  let senha = prompt("Digite a senha para liberar edição:");
  if(senha !== "464007"){
    alert("Senha incorreta!");
    return;
  }

  modoVisualizar = false;
  formBox.classList.remove("readonly");
  editar(selecionado);
}

function visualizarSelecionado(){
  if(!selecionado) return alert("Selecione um morador");

  modoVisualizar = true;
  formBox.classList.add("readonly");

  editar(selecionado);
}

function editar(m){
  selecionado=m;
  editId=m.id;

  nomeEl.value=m.nome;
  cpfEl.value=m.cpf;
  rgEl.value=m.rg;
  cnhEl.value=m.cnh;
  enderecoEl.value=m.endereco;
  quadraEl.value=m.quadra||"";
  cidadeEl.value=m.cidade||"";
  obsEl.value=m.obs||"";

  placasEl.innerHTML="";
  familiaresEl.innerHTML="";

  (m.placas||[]).forEach(p=>{
    let i=document.createElement("input");
    i.value=p.toUpperCase();
    i.oninput=()=>i.value=i.value.toUpperCase();
    placasEl.appendChild(i);
  });

  (m.familiares||[]).forEach(f=>{
    let i=document.createElement("input");
    i.value=f;
    familiaresEl.appendChild(i);
  });

  fotoBase64=m.foto||"";
  previewEl.src=m.foto||"";

  render();
}

function apagarSelecionado(){
  if(!selecionado) return alert("Selecione um morador");

  if(!confirm("Tem certeza que deseja apagar este morador?")) return;

  let senha = prompt("Digite a senha para confirmar exclusão:");
  if(senha !== "464007"){
    alert("Senha incorreta!");
    return;
  }

  moradores = moradores.filter(m=>m.id!==selecionado.id);
  selecionado=null;
  editId=null;
  salvarArquivo();
}

function novoMorador(){
  selecionado=null;
  editId=null;
  limpar();
  formBox.classList.remove("readonly");
}

function addPlaca(){
  let i=document.createElement("input");
  i.oninput=()=>i.value=i.value.toUpperCase();
  placasEl.appendChild(i);
}

function addFam(){
  familiaresEl.appendChild(document.createElement("input"));
}

function foto(e){
  let f=e.target.files[0];
  let r=new FileReader();
  r.onload=()=>{fotoBase64=r.result; previewEl.src=r.result;}
  r.readAsDataURL(f);
}

function limpar(){
  nomeEl.value=cpfEl.value=rgEl.value=cnhEl.value=enderecoEl.value="";
  quadraEl.value="";
  cidadeEl.value="";
  obsEl.value="";
  placasEl.innerHTML="";
  familiaresEl.innerHTML="";
  previewEl.src="";
  fotoBase64="";
  editId=null;
  selecionado=null;
}

function render(){
  let q=document.getElementById("busca").value?.toLowerCase()||"";
  listaEl.innerHTML="";

  let listaOrdenada = moradores
  .filter(m=>m.nome.toLowerCase().includes(q)||m.cpf.includes(q)||m.rg.includes(q))
  .sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR',{sensitivity:'base'}));

  listaOrdenada.forEach(m=>{
    let div=document.createElement("div");
    div.className="card"+(selecionado?.id===m.id?" selected":"");
    div.onclick=()=>{selecionado=m; render();};

    div.innerHTML=`
      <b>${m.nome}</b><br>
      ${m.cpf}<br>
      <img src="${m.foto||''}">
    `;

    listaEl.appendChild(div);
  });
}

</script>

</body>
</html>
